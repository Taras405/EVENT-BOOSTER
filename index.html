<!doctype html>
<html lang="ua">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/svg+xml" href="/EVENT-BOOSTER/logo.svg" />
    <link rel="icon" type="image/png" href="/EVENT-BOOSTER/favicon.png" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.css"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.css"
    />

    <title>EVENT BOOSTER</title>
    <script type="module" crossorigin src="/EVENT-BOOSTER/assets/index-BcZZ1eWt.js"></script>
    <link rel="stylesheet" crossorigin href="/EVENT-BOOSTER/assets/index-BJ8FtH9A.css">
  </head>
  <body>
    <div id="app-loader" class="loader-wrapper">
      <div class="loader">
        <div class="loader-ring"></div>
        <div class="loader-text">LOADING...</div>
      </div>
    </div>

    <header class="header">
      <a href="#" class="logo" aria-label="Event Booster logo"
        ><img src="logo.png" alt="Event Booster logo"
      /></a>
      <div class="container header__inner">
        <h1 class="title">
          FIND BEST EVENTS<br />
          AROUND THE WORLD
        </h1>
    
        <div class="filters">
          <div class="filter">
            <label class="visually-hidden" for="search-input"></label>
            <input
              id="search-input"
              type="text"
              class="search-input"
              placeholder="Start searching"
            />
          </div>
    
          <div class="filter filter--select">
            <select id="country-select" class="country-select">
              <option value="">Choose country</option>
            </select>
          </div>
        </div>
      </div>
    </header>
    <main><section class="events">
  <div class="container">
    <ul class="events__list"></ul>
  </div>
</section>

</main>
    <section class="footer">
      <div class="container">
        <p class="footer__text">© 2026 | All Rights Reserved | Developed with ♥ by GoIT Students</p>
      </div>
    </section>

  </body>
</html>
